<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Área administrativa – Descarte Consciente São Borja">
  <!-- RNF4: tecnologias estáveis, sem dependências externas além das já usadas -->
  <title>Admin – Descarte Consciente</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Página de autenticação ── */
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--verde-escuro) 0%, var(--azul-escuro) 60%, #0f3525 100%);
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-blob {
      position: absolute; border-radius: 50%;
      -webkit-filter: blur(80px); filter: blur(80px);
      opacity: 0.1;
    }
    .auth-blob-1 { width: 400px; height: 400px; background: var(--verde-vivo); top: -100px; right: -80px; }
    .auth-blob-2 { width: 350px; height: 350px; background: var(--azul-ceu); bottom: -80px; left: -60px; }

    .auth-card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 2;
      -webkit-box-shadow: 0 24px 60px rgba(0,0,0,0.35);
              box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 60px; height: 60px;
      background: var(--verde-escuro);
      border-radius: 16px;
      display: -webkit-inline-box;
      display: -ms-inline-flexbox;
      display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    .auth-logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem; font-weight: 800;
      color: var(--verde-escuro); letter-spacing: -0.02em;
    }
    .auth-logo p { font-size: 0.83rem; color: #4a6655; font-weight: 300; margin-top: 2px; }

    /* Abas login / cadastro */
    .auth-tabs {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      background: var(--cinza-claro);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      -webkit-box-flex: 1;
          -ms-flex: 1;
              flex: 1;
      padding: 9px;
      text-align: center;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
      color: #888;
      -webkit-transition: all 0.2s;
              transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-tab.active {
      background: var(--verde-escuro);
      color: var(--verde-vivo);
      -webkit-box-shadow: 0 2px 8px rgba(0,0,0,0.15);
              box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* Formulários */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--verde-escuro); margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 10px; font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      outline: none; color: var(--cinza-texto);
      -webkit-transition: border-color 0.2s;
              transition: border-color 0.2s;
      background: #fff;
      /* RNF1: usa apenas propriedades compatíveis cross-browser */
      -webkit-appearance: none;
              appearance: none;
    }
    .form-group input:focus { border-color: var(--verde-claro); }
    .form-group input.erro { border-color: #e05a3a; }

    .form-btn {
      width: 100%; padding: 13px;
      background: var(--verde-escuro); color: var(--verde-vivo);
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.97rem; cursor: pointer;
      -webkit-transition: all 0.2s; transition: all 0.2s;
      margin-top: 6px;
    }
    .form-btn:hover {
      background: var(--verde-medio);
      -webkit-transform: translateY(-1px);
              transform: translateY(-1px);
    }
    .form-btn:active { -webkit-transform: translateY(0); transform: translateY(0); }

    .alert {
      padding: 11px 16px; border-radius: 8px;
      font-size: 0.85rem; font-weight: 500;
      margin-bottom: 18px; display: none;
    }
    .alert.erro { background: #fff0ed; color: #c0392b; border: 1px solid #fdc6bb; display: block; }
    .alert.ok   { background: #edfff5; color: #1a6b47; border: 1px solid #a8e6c3; display: block; }

    .form-footer {
      text-align: center; margin-top: 20px;
      font-size: 0.8rem; color: #4a6655;
    }
    .form-footer a { color: var(--verde-claro); text-decoration: none; }

    .requisitos-senha {
      font-size: 0.75rem; color: #999; margin-top: 5px;
    }
    .req-item { display: -webkit-box; display: -ms-flexbox; display: flex; align-items: center; gap: 4px; margin-top: 2px; color: #4a6655; }
    .req-item.ok { color: var(--verde-claro); }
    .req-icon { font-size: 0.7rem; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-blob auth-blob-1"></div>
  <div class="auth-blob auth-blob-2"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">♻️</div>
      <h1>Descarte Consciente</h1>
      <p>Área Administrativa · São Borja – RS</p>
    </div>

    <!-- ABAS -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login"
        onclick="trocarAba('login')" role="tab" aria-selected="true">
        🔑 Entrar
      </button>
      <button class="auth-tab" id="tab-cadastro"
        onclick="trocarAba('cadastro')" role="tab" aria-selected="false">
        ➕ Cadastrar
      </button>
    </div>

    <!-- ── PAINEL LOGIN ── -->
    <div class="form-panel active" id="panel-login" role="tabpanel">
      <div class="alert" id="alerta-login"></div>
      <div class="form-group">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-senha">Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="form-btn" onclick="fazerLogin()">Entrar no painel →</button>
      <div class="form-footer">
        Não tem conta? <a href="#" onclick="trocarAba('cadastro');return false;">Cadastre-se</a>
      </div>
    </div>

    <!-- ── PAINEL CADASTRO ── -->
    <div class="form-panel" id="panel-cadastro" role="tabpanel">
      <div class="alert" id="alerta-cadastro"></div>
      <div class="form-group">
        <label for="cad-nome">Nome completo</label>
        <input type="text" id="cad-nome" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="cad-email">E-mail</label>
        <input type="email" id="cad-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="cad-senha">Senha</label>
        <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres"
          autocomplete="new-password" oninput="validarSenha(this.value)">
        <div class="requisitos-senha" id="requisitos-senha">
          <div class="req-item" id="req-len"><span class="req-icon">○</span> Mínimo 6 caracteres</div>
          <div class="req-item" id="req-num"><span class="req-icon">○</span> Pelo menos um número</div>
        </div>
      </div>
      <div class="form-group">
        <label for="cad-confirma">Confirmar senha</label>
        <input type="password" id="cad-confirma" placeholder="Repita a senha" autocomplete="new-password">
      </div>
      <button class="form-btn" onclick="fazerCadastro()">Criar conta →</button>
      <div class="form-footer">
        Já tem conta? <a href="#" onclick="trocarAba('login');return false;">Entrar</a>
      </div>
    </div>

  </div><!-- /.auth-card -->
</div><!-- /.auth-page -->

<script src="js/storage.js"></script>
<script>
  // Redireciona se já logado
  (function () {
    if (DB.getSessao()) window.location.href = 'painel.html';
  })();

  function trocarAba(aba) {
    var abas = ['login', 'cadastro'];
    abas.forEach(function (a) {
      document.getElementById('panel-' + a).classList.toggle('active', a === aba);
      var tab = document.getElementById('tab-' + a);
      tab.classList.toggle('active', a === aba);
      tab.setAttribute('aria-selected', a === aba ? 'true' : 'false');
    });
    limparAlertas();
  }

  function limparAlertas() {
    ['alerta-login', 'alerta-cadastro'].forEach(function (id) {
      var el = document.getElementById(id);
      el.className = 'alert'; el.textContent = '';
    });
  }

  function mostrarAlerta(id, tipo, msg) {
    var el = document.getElementById(id);
    el.className = 'alert ' + tipo;
    el.textContent = msg;
  }

  function validarSenha(val) {
    var reqLen = document.getElementById('req-len');
    var reqNum = document.getElementById('req-num');
    var okLen = val.length >= 6;
    var okNum = /\d/.test(val);
    reqLen.className = 'req-item' + (okLen ? ' ok' : '');
    reqLen.querySelector('.req-icon').textContent = okLen ? '✓' : '○';
    reqNum.className = 'req-item' + (okNum ? ' ok' : '');
    reqNum.querySelector('.req-icon').textContent = okNum ? '✓' : '○';
  }

  function fazerLogin() {
    var email = document.getElementById('login-email').value.trim();
    var senha = document.getElementById('login-senha').value;
    if (!email || !senha) {
      mostrarAlerta('alerta-login', 'erro', '⚠️ Preencha e-mail e senha.');
      return;
    }
    var res = DB.login(email, senha);
    if (!res.ok) {
      mostrarAlerta('alerta-login', 'erro', '❌ ' + res.erro);
    } else {
      window.location.href = 'painel.html';
    }
  }

  function fazerCadastro() {
    var nome   = document.getElementById('cad-nome').value.trim();
    var email  = document.getElementById('cad-email').value.trim();
    var senha  = document.getElementById('cad-senha').value;
    var conf   = document.getElementById('cad-confirma').value;

    if (!nome || !email || !senha || !conf) {
      mostrarAlerta('alerta-cadastro', 'erro', '⚠️ Preencha todos os campos.');
      return;
    }
    if (senha.length < 6 || !/\d/.test(senha)) {
      mostrarAlerta('alerta-cadastro', 'erro', '⚠️ Senha deve ter 6+ caracteres e ao menos um número.');
      return;
    }
    if (senha !== conf) {
      mostrarAlerta('alerta-cadastro', 'erro', '⚠️ As senhas não coincidem.');
      return;
    }

    var res = DB.cadastrarUsuario(nome, email, senha);
    if (!res.ok) {
      mostrarAlerta('alerta-cadastro', 'erro', '❌ ' + res.erro);
    } else {
      mostrarAlerta('alerta-cadastro', 'ok', '✅ Conta criada! Redirecionando...');
      DB.login(email, senha);
      setTimeout(function () { window.location.href = 'painel.html'; }, 1200);
    }
  }

  // Enter key nos campos
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var aba = document.getElementById('panel-login').classList.contains('active') ? 'login' : 'cadastro';
    if (aba === 'login') fazerLogin();
    else fazerCadastro();
  });
</script>
</body>
</html>
